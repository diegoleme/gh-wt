# gh-wt user configuration
# Settings here apply to all repos. Repo .gh-wt.yml overrides these.
#
# This default is tailored for a zellij + claude workflow.
# Workspace: zellij --layout ~/.config/gh-wt/workspace.kdl

tui:
  keybindings:
    # <enter> is unified: if the issue has no worktree yet it runs
    # `gh wt start` first (which prints the new worktree path), then opens a
    # claude pane for it. If a worktree already exists it opens/focuses the
    # pane resuming the latest claude session (--resume -> claude -r).
    # The leading '#' is quoted so sh doesn't read it as a comment.
    - key: enter
      label: "open"
      command: |
        if [ -n {{.Branch}} ]; then
          ~/.config/gh-wt/open-or-focus.sh --resume '#{{.IssueNumber}} '{{.IssueTitle}} {{.Path}}
        else
          WT=$(gh wt start {{.IssueNumber}}) && ~/.config/gh-wt/open-or-focus.sh '#{{.IssueNumber}} '{{.IssueTitle}} "$WT"
        fi

    - key: d
      label: "delete"
      confirm: true
      requires:
        - worktree
      command: "git worktree remove {{.Path}} --force && git branch -D {{.Branch}}"
      output: true

    - key: w
      label: "open web"
      requires:
        - issue
      command: "if [ {{.PRNumber}} -gt 0 ]; then gh pr view {{.PRNumber}} --web; else gh issue view {{.IssueNumber}} --web; fi"
